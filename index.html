<!DOCTYPE html>
<html>
<head>
<title>Important Question ❤️</title>

<style>
body{
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#f44336;
color:white;
position:relative;
}

#message{
display:none;
font-size:35px;
color:white;
}
</style>
</head>

<body>

<h1 id="question">Will you be my girlfriend? ❤️</h1>

<div id="buttons">
<button id="yes" onclick="sayYes()">Yes</button>
<button id="no" onmouseover="moveNo()">No</button>
</div>

<h2 id="message">🎉 Congratulations! You are now my girlfriend ❤️</h2>

<script>

let count = 0;

function moveNo(){

count++;

if(count <= 4){

let x = Math.random()*300 - 150;
let y = Math.random()*200 - 100;

document.getElementById("no").style.transform =
`translate(${x}px, ${y}px)`;

}

else{
sayYes();
}

}

function sayYes(){

document.getElementById("question").style.display="none";
document.getElementById("buttons").style.display="none";
document.getElementById("message").style.display="block";

}

</script>

</body>
</html>
