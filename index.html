<!DOCTYPE html>
<html>

<head>

<title>For Someone Special ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.page{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

img{
max-width:300px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#f44336;
color:white;
position:relative;
}

#page2, #page3{
display:none;
}

#final{
display:none;
font-size:30px;
margin-top:20px;
}

</style>

</head>

<body>

<!-- PAGE 1 -->

<div id="page1" class="page">

<img src="her.jpg">

<h2>Sometimes one person changes everything...</h2>

<button onclick="nextPage()">Continue ❤️</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="page">

<img src="her.jpg">

<h2>

I didn't plan to like you this much...  
<br><br>
But somehow you became very special to me.

</h2>

<button onclick="question()">I want to ask you something</button>

</div>

<!-- PAGE 3 -->

<div id="page3" class="page">

<img src="her.jpg">

<h2>Will you be my girlfriend? ❤️</h2>

<button id="yes" onclick="sayYes()">Yes</button>

<button id="no" onmouseover="moveNo()">No</button>

<h2 id="final">

🎉 Congratulations ❤️  
<br>
You just made me the happiest person.

</h2>

</div>

<script>

let count = 0;

function nextPage(){

document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";

}

function question(){

document.getElementById("page2").style.display="none";
document.getElementById("page3").style.display="flex";

}

function moveNo(){

count++;

if(count <=4){

let x = Math.random()*400 - 200;
let y = Math.random()*200 - 100;

document.getElementById("no").style.transform =
`translate(${x}px,${y}px)`;

}

else{

sayYes();

}

}

function sayYes(){

document.getElementById("yes").style.display="none";
document.getElementById("no").style.display="none";

document.getElementById("final").style.display="block";

}

</script>

</body>

</html>
